<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QOTD</title>
</head>
<body>
    <div id="app">
    <div id="question"></div>

<label>
  <input type="checkbox" id="toggleAnswer"> Vis svar
</label>

<div id="answer" style="display:none;"></div>

    </div>
<script>
async function loadQnA() {
fetch('/api/qna')
  .then(r => r.json())
  .then(d => {
    document.getElementById('question').innerHTML = d.q;
    document.getElementById('answer').innerHTML = d.a;
  });
}

const checkbox = document.getElementById('toggleAnswer');
const answerDiv = document.getElementById('answer');

checkbox.addEventListener('change', () => {
  answerDiv.style.display = checkbox.checked ? 'block' : 'none';
});

loadQnA();
</script>
</script>
<style>
/* Base */
body {
  margin: 0;
  padding: 24px;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #111111aa;
  color: #fff;
}

/* Container (optional wrapper if you add one) */
#app {
  max-width: 900px;
  margin: 0 auto;
}

/* Question */
#question {
  font-size: 2rem;
  line-height: 1.3;
  font-weight: 600;
  margin-bottom: 24px;
  padding: 16px 20px;
  background: #1e1e1e;
  border-left: 6px solid #4caf50;
  border-radius: 8px;
}

/* Checkbox label */
label {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1.1rem;
  margin-bottom: 20px;
  cursor: pointer;
}

/* Larger checkbox */
input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #4caf50;
  cursor: pointer;
}

/* Answer */
#answer {
  font-size: 1.6rem;
  line-height: 1.4;
  padding: 16px 20px;
  background: #1e1e1e;
  border-left: 6px solid #2196f3;
  border-radius: 8px;
}

/* Optional: smooth reveal */
#answer {
  transition: opacity 0.2s ease;
}

/* Checkbox container */
label {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1.1rem;
  margin-bottom: 20px;
  cursor: pointer;
  color: #e0e0e0;
}

/* Custom checkbox */
input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 2px solid #4caf50;
  border-radius: 6px;
  background: #1e1e1e;
  display: grid;
  place-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}

/* Checkmark */
input[type="checkbox"]::before {
  content: "";
  width: 12px;
  height: 12px;
  transform: scale(0);
  transition: transform 0.1s ease-in-out;
  background-color: #4caf50;
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0, 43% 62%);
}

/* Checked state */
input[type="checkbox"]:checked {
  border-color: #2196f3;
}

input[type="checkbox"]:checked::before {
  transform: scale(1);
  background-color: #2196f3;
}

/* Focus state */
input[type="checkbox"]:focus {
  outline: 2px solid #2196f3;
  outline-offset: 2px;
}
</style>
</body>
</html>
